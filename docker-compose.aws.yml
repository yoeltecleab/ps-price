# AWS production overlay for PS Price.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.aws.yml up -d --build
#
# What this overlay does on top of docker-compose.yml:
#   - Removes public bindings on backend (8000) and frontend (3000)
#   - Adds Caddy as the HTTPS reverse proxy on ports 80/443
#
# Prerequisites:
#   - A Caddyfile on the server (see deploy/Caddyfile.example)
#   - Your domain's A record pointing at your EC2 Elastic IP (for HTTPS)
#   - .env filled out with production values (especially PS_PRICE_CORS_ORIGINS)

services:
  postgres:
    ports: !reset []

  backend:
    restart: unless-stopped
    ports: !reset []

  frontend:
    restart: unless-stopped
    ports: !reset []

  caddy:
    image: caddy:2-alpine
    container_name: ps-price-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - ps-price-network
    depends_on:
      frontend:
        condition: service_started

volumes:
  caddy_data:
  caddy_config:
